# Fly.io 設定檔
# 文件：https://fly.io/docs/reference/configuration/

app = "market-radar"
primary_region = "nrt"   # 東京 — 離台灣最近

[build]

[env]
  PYTHONUNBUFFERED = "1"
  PYTHONPATH = "/app"

[http_service]
  internal_port = 8501
  force_https = true
  # 不冷啟動：保持至少一個 machine 跑著
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  timeout = "5s"
  path = "/_stcore/health"

# 免費額度：3 個 shared-cpu-1x VM (256MB RAM each)
# 我們只用 1 個 + 加大記憶體到 512MB（會輕微計費，個人 dashboard 還在 $5 信用額度內）
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
