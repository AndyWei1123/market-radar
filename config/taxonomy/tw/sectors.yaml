  policy_summary: 金融科技產業政府政策 1.金融科技發展與創新實驗條例 創新科技的發展正急速翻轉我們的生活和世界，科技用於金融方面即是其中之一。金融科技（FinTech）將改變全球商業模式，為金融服務帶來新樣貌、新體驗，除可提供民眾更安全、有效率的金融服務，亦能促進普惠金融，讓更多人因此受益。台灣為因應無現金社會的到來，亦正朝2025年達到行動支付普及率90%的目標邁進中。
