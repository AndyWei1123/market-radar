  policy_summary: 資通安全產業政府政策 1.「國家資通安全發展方案（114年至117年）」（第七期發展方案） 我國自90年起，由行政院國家資通安全會報陸續推動6個階段、各為期4年之國家資通安全發展方案，逐步達成「建立安全資安環境，完備資安防護管理，分享多元資安情報，擴大資安人才培育，加強國際資安交流」之階段性目標，有效提升我國資安完備度。
    為持續推動我國資安防護策略，於114年發布第七期國家資通安全發展方案(114年至117年)，將以政府、產業、人才共三個要素，從政府擴大資安產業規模，與產業共同培育資安人才，續由廠商提升資安產品防護效能，以及培育後之人才再投入至政府及產業
