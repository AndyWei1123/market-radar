  policy_summary: 太空衛星產業政府政策 1、六大核心戰略產業推動方案 行政院於2021年核定六大核心戰略產業推動方案，方案期程為2021-2024年，預計總共投入1,132億元，將整合經濟部、科技部、交通部等資源，重點發展資訊及數位、資安卓越產業、台灣精準健康、綠電及再生能源、國防及戰略、民生及戰備等六大產業，目標在後疫情時代，臺灣能掌握全球供應鏈重組先機，成為為全球經濟之關鍵力量。
    太空產業被納入為國防及戰略產業推動之一環，目標是臺灣成為全球太空產業重要供應鏈。主要推動策略包含精進遙測衛星技術、臺灣太空產品檢測驗證、建立B5G通訊衛星技術及行銷太空國家品牌等。在研製國產
