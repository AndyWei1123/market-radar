  policy_summary: 汽車產業政府政策 1. 智慧製造設備推動計畫 「智慧製造設備推動計畫」本計畫依據新期程之「碁盤扎根化」、「系統智慧化」、「應用多元化」、「技術AI化」四個精進作法，規劃聚焦在產業機械、機器人等產業範疇，協助產業從關鍵零組件、整機、整線甚至到整廠，透過整合各種智慧機械元素，使機械設備具備相關智慧化加值功能，例如優化生產排程、故障檢知、視覺辨識與精度補償設定等，滿足終端產業需求，達到彈性生產、提高產品效率及達交率，提升產業智慧化升級轉型之目的。
