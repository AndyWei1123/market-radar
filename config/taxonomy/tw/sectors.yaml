  policy_summary: 一、緣起 文創產業的基礎來自國家的文化底蘊，文化經濟的發展需以藝文產業內容為核心，掌握文化主體性，逐步開展。未來文化部將提升文化內涵提振文化經濟，以「向下紮根，走向國際」兩個面向逐步落實，期望透過文化經濟的傳播，將在地文化推向全球，進而提升經濟，讓文創產業形成一種正向的循環，實現「愈在地、愈國際」的文化價值。
